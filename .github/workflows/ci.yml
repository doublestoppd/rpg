name: CI

on:
  push:
    branches: ['**']
  pull_request:

# Least privilege: CI only reads the repository (Phase 18).
permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: rpg
          POSTGRES_PASSWORD: rpg
          POSTGRES_DB: rpg
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U rpg"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: Format check
        run: npm run format:check
      - name: Lint
        run: npm run lint
      - name: Type check
        run: npm run typecheck
      - name: Repository structure
        run: npm run verify:structure
      - name: API baseline is frozen (unreviewed contract changes fail)
        run: npm run verify:baseline
        env:
          TEST_DATABASE_URL: postgresql://rpg:rpg@localhost:5432/rpg_test
      - name: Unit, API, integration, and compatibility tests
        run: npm test
        env:
          TEST_DATABASE_URL: postgresql://rpg:rpg@localhost:5432/rpg_test
      - name: Production dependency audit (high/critical fails)
        run: npm run audit:prod
      - name: Generate SBOM (CycloneDX)
        run: npm run sbom > sbom.cyclonedx.json || true
      - name: Production build
        run: npm run build
      - name: Content validation (versioned-content publication rules)
        run: npm run content:validate
        env:
          # The test step above seeds rpg_test (content tables are seed config,
          # not truncated between tests), so the live content is present here.
          DATABASE_URL: postgresql://rpg:rpg@localhost:5432/rpg_test
