# Development environment: PostgreSQL, API dev service, web dev service, and
# the job worker.
#
# Cross-platform note: the repo is bind-mounted into the Node containers, but a
# container-owned `node_modules` volume SHADOWS the host's. A one-shot `deps`
# service installs Linux-native dependencies (and generates the Prisma client)
# into that volume before the app services start, so it does not matter what OS
# or CPU the host used for its own `npm ci` — macOS/Windows/Linux all work. The
# host's `node_modules` is only for local tooling (tests, typecheck, IDE) and
# never leaks into the containers.
#
# Production never uses this file: it runs `npm run start:api` and
# `npm run start:worker` as separate processes and serves the static web
# build (see ADR 0007).

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: rpg
      POSTGRES_PASSWORD: rpg
      POSTGRES_DB: rpg
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U rpg -d rpg']
      interval: 5s
      timeout: 3s
      retries: 10

  # One-shot: install Linux-native dependencies + generate the Prisma engine
  # into the shared node_modules volume, then exit. App services wait for it.
  deps:
    image: node:22-bookworm-slim
    working_dir: /app
    command: sh -c "npm ci && npx prisma generate --schema prisma/schema.prisma"
    volumes:
      - .:/app
      - node_modules:/app/node_modules

  api:
    image: node:22-bookworm-slim
    working_dir: /app
    command: sh -c "npx prisma migrate deploy --schema prisma/schema.prisma && node prisma/seed.mjs && npm run dev --workspace apps/api"
    environment:
      DATABASE_URL: postgresql://rpg:rpg@postgres:5432/rpg
      PORT: '3000'
      HOST: 0.0.0.0
    ports:
      - '3000:3000'
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      deps:
        condition: service_completed_successfully

  worker:
    image: node:22-bookworm-slim
    working_dir: /app
    command: npm run dev:worker --workspace apps/api
    environment:
      DATABASE_URL: postgresql://rpg:rpg@postgres:5432/rpg
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      deps:
        condition: service_completed_successfully

  web:
    image: node:22-bookworm-slim
    working_dir: /app
    command: npm run dev --workspace apps/web
    environment:
      VITE_API_PROXY_TARGET: http://api:3000
    ports:
      - '5173:5173'
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    depends_on:
      deps:
        condition: service_completed_successfully
      api:
        condition: service_started

volumes:
  pgdata:
  node_modules:
